services:
  ecommerce-inventory:
    build: .
    container_name: ecommerce-inventory
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-小凯哥电商进销存}
      SECRET_KEY: ${SECRET_KEY:-change-me}
      AUTH_USERNAME: ${AUTH_USERNAME:-admin}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-admin123}
      RETURN_API_TOKEN: ${RETURN_API_TOKEN:-change-me}
      RETURN_SYSTEM_DATABASE_PATH: ${RETURN_SYSTEM_DATABASE_PATH:-}
      DATABASE_PATH: /app/runtime/data/app.db
      EXPORT_DIR: /app/runtime/exports
      HOST: 0.0.0.0
      PORT: 5100
    volumes:
      - ./data:/app/runtime/data
      - ./exports:/app/runtime/exports
    ports:
      - "${HOST_PORT:-5100}:5100"
